version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mockly-postgres
    environment:
      POSTGRES_DB: mockly
      POSTGRES_USER: mockly
      POSTGRES_PASSWORD: mockly_password
      LANG: en_US.utf8
      LC_ALL: en_US.utf8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockly"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mockly-redis
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  minio:
    image: minio/minio:latest
    container_name: mockly-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  livekit:
    image: livekit/livekit-server:latest
    container_name: mockly-livekit
    command: --dev --bind 0.0.0.0 --config /etc/livekit/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

  egress:
    image: livekit/egress:latest
    container_name: mockly-egress
    environment:
      EGRESS_CONFIG_FILE: /etc/livekit/egress.yaml
    volumes:
      - ./egress.yaml:/etc/livekit/egress.yaml:ro
    cap_add:
      - SYS_ADMIN
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mockly-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: dev

      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}

      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://localhost:7880}
      LIVEKIT_API_URL: ${LIVEKIT_API_URL:-http://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      LIVEKIT_WEBHOOK_SECRET: ${LIVEKIT_WEBHOOK_SECRET:-secret}
      LIVEKIT_EGRESS_AUTO_RECORD: ${LIVEKIT_EGRESS_AUTO_RECORD:-true}
      LIVEKIT_EGRESS_S3_ENDPOINT: ${LIVEKIT_EGRESS_S3_ENDPOINT:-http://minio:9000}
      LIVEKIT_EGRESS_WEBHOOK_URL: ${LIVEKIT_EGRESS_WEBHOOK_URL:-http://app:8080/api/webhooks/livekit}
      LIVEKIT_EGRESS_WEBHOOK_SIGNING_KEY: ${LIVEKIT_EGRESS_WEBHOOK_SIGNING_KEY:-devkey}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://host.docker.internal:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      livekit:
        condition: service_started
      egress:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: mockly-network
