name: Deploy AWS EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "ai/**"
      - "deploy/aws/**"
      - ".github/workflows/deploy-aws-ec2.yml"

concurrency:
  group: deploy-aws-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ vars.EC2_APP_DIR }}"
            REF="${{ vars.DEPLOY_REF }}"

            if [ -z "${APP_DIR}" ]; then
              APP_DIR="/opt/mockly"
            fi
            if [ -z "${REF}" ]; then
              REF="main"
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git checkout "$REF"
            git pull origin "$REF"

            bash deploy/aws/deploy.sh
