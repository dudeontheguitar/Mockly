services:
  caddy:
    image: caddy:2
    container_name: ${PROJECT_NAME:-mockly}-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      API_DOMAIN: ${API_DOMAIN}
      ML_DOMAIN: ${ML_DOMAIN}
      LIVEKIT_DOMAIN: ${LIVEKIT_DOMAIN}
      MINIO_DOMAIN: ${MINIO_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - ai
      - livekit

  postgres:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-mockly}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      LANG: en_US.utf8
      LC_ALL: en_US.utf8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-mockly}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: ${PROJECT_NAME:-mockly}-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  livekit:
    image: livekit/livekit-server:latest
    container_name: ${PROJECT_NAME:-mockly}-livekit
    restart: unless-stopped
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses:
          - 0.0.0.0
        log_level: info
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
        redis:
          address: redis:6379
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
        webhook:
          api_key: ${LIVEKIT_API_KEY}
          urls:
            - http://app:8080/api/webhooks/livekit
    ports:
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    depends_on:
      redis:
        condition: service_healthy

  egress:
    image: livekit/egress:latest
    container_name: ${PROJECT_NAME:-mockly}-egress
    restart: unless-stopped
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        insecure: true
        redis:
          address: redis:6379
        logging:
          level: info
    cap_add:
      - SYS_ADMIN
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  ai:
    build:
      context: ../../ai
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-mockly}-ai
    restart: unless-stopped
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS}

  ollama:
    image: ollama/ollama:latest
    container_name: ${PROJECT_NAME:-mockly}-ollama
    restart: unless-stopped
    profiles:
      - ollama
    volumes:
      - ollama_data:/root/.ollama

  app:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-mockly}-app
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      MINIO_ENDPOINT: https://${MINIO_DOMAIN}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}

      LIVEKIT_URL: wss://${LIVEKIT_DOMAIN}
      LIVEKIT_API_URL: http://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_WEBHOOK_SECRET: ${LIVEKIT_WEBHOOK_SECRET}
      LIVEKIT_EGRESS_AUTO_RECORD: ${LIVEKIT_EGRESS_AUTO_RECORD}
      LIVEKIT_EGRESS_S3_ENDPOINT: http://minio:9000
      LIVEKIT_EGRESS_WEBHOOK_URL: http://app:8080/api/webhooks/livekit
      LIVEKIT_EGRESS_WEBHOOK_SIGNING_KEY: ${LIVEKIT_EGRESS_WEBHOOK_SIGNING_KEY}
      LIVEKIT_EGRESS_FILE_TYPE: ${LIVEKIT_EGRESS_FILE_TYPE}

      ML_SERVICE_URL: http://ai:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      livekit:
        condition: service_started
      egress:
        condition: service_started
      ai:
        condition: service_started

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
